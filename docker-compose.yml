version: "3.9"

services:
  server:
    build:
      context: ./packages/server
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - NODE_ENV=production
    restart: unless-stopped

  relay-udp:
    build:
      context: ./packages/relay-udp
      dockerfile: Dockerfile
    ports:
      - "4242:4242/udp"
    environment:
      - RELAY_ADDR=:4242
    restart: unless-stopped
